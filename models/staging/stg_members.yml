version: 2

models:
  - name: stg_members
    description: "Staging model for members data with trimmed string fields, standardised membership status, and missing email flag."

    columns:
      - name: member_id
        description: "Unique identifier for each member."
        tests:
          - not_null
          - unique

      - name: first_name
        description: "Trimmed first name."
        tests:
        - not_null

      - name: last_name
        description: "Trimmed last name."
        tests:
        - not_null

      - name: email
        description: "Trimmed email address. Missing emails are preserved as null."

      - name: missing_email_flag
        description: "True when email is missing or blank."
        tests:
          - not_null

      - name: membership_status
        description: "Standardised membership status."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'inactive', 'unknown']

      - name: date_of_birth
        description: "Member date of birth."
        tests:
        - not_null

      - name: join_date
        description: "Date the member joined."
        tests:
        - not_null

      - name: home_club
        description: "Trimmed home club name."
        tests:
          - accepted_values:
              arguments:
                values: ['Bow', 'Canary Wharf', 'Hackney', 'Stratford']
unit_tests:
  - name: test_stg_members_missing_email_flag
    model: stg_members
    given:
      - input: source('fitness_dataset', 'members')
        rows:
          - {member_id: 1, first_name: 'A', last_name: 'B', email: null, date_of_birth: '1990-01-01', join_date: '2024-01-01', membership_status: 'active', home_club: 'Bow'}
          - {member_id: 2, first_name: 'A', last_name: 'B', email: '', date_of_birth: '1990-01-01', join_date: '2024-01-01', membership_status: 'active', home_club: 'Bow'}
          - {member_id: 3, first_name: 'A', last_name: 'B', email: ' ', date_of_birth: '1990-01-01', join_date: '2024-01-01', membership_status: 'active', home_club: 'Bow'}
          - {member_id: 4, first_name: 'A', last_name: 'B', email: 'test@email.com', date_of_birth: '1990-01-01', join_date: '2024-01-01', membership_status: 'active', home_club: 'Bow'}
    expect:
      rows:
        - {member_id: 1, missing_email_flag: true}
        - {member_id: 2, missing_email_flag: true}
        - {member_id: 3, missing_email_flag: true}
        - {member_id: 4, missing_email_flag: false}