version: 2

models:
  - name: int_class_attendance
    description: "Intermediate model joining bookings and classes to derive attendance outcomes and flag inconsistent records."

    columns:
      - name: booking_id
        description: "Unique identifier for the booking."
        tests:
          - not_null
          - unique

      - name: member_id
        description: "Unique identifier for the member."
        tests:
          - not_null

      - name: class_id
        description: "Unique identifier for the class."
        tests:
          - not_null

      - name: attended_flag
        description: "True when the booking was attended."
        tests:
          - not_null

      - name: no_show_flag
        description: "True when the booking was a no-show or missed."
        tests:
          - not_null

      - name: cancelled_flag
        description: "True when the booking was cancelled."
        tests:
          - not_null

      - name: attended_but_no_check_in_flag
        description: "True when a booking is marked attended but no check-in timestamp exists."
        tests:
          - not_null

      - name: cancelled_after_class_start_flag
        description: "True when a booking was cancelled after the scheduled class start."
        tests:
          - not_null

      - name: late_check_in_flag
        description: "True when check-in happened after the scheduled class start."
        tests:
          - not_null

unit_tests:
  - name: test_int_class_attendance_flags
    model: int_class_attendance
    given:
      - input: source('fitness_dataset', 'bookings')
        rows:
          - {booking_id: 1, member_id: 101, class_id: 1001, booking_timestamp: '2024-01-01 09:00:00', attendance_status: 'attended', check_in_timestamp: '2024-01-02 09:55:00', cancellation_timestamp: null}
          - {booking_id: 2, member_id: 102, class_id: 1002, booking_timestamp: '2024-01-01 09:00:00', attendance_status: 'attended', check_in_timestamp: null, cancellation_timestamp: null}
          - {booking_id: 3, member_id: 103, class_id: 1003, booking_timestamp: '2024-01-01 09:00:00', attendance_status: 'cancelled', check_in_timestamp: null, cancellation_timestamp: '2024-01-03 10:05:00'}
          - {booking_id: 4, member_id: 104, class_id: 1004, booking_timestamp: '2024-01-01 09:00:00', attendance_status: 'missed', check_in_timestamp: null, cancellation_timestamp: null}
          - {booking_id: 5, member_id: 105, class_id: 1005, booking_timestamp: '2024-01-01 09:00:00', attendance_status: 'attended', check_in_timestamp: '2024-01-05 10:10:00', cancellation_timestamp: null}

      - input: source('fitness_dataset', 'classes')
        rows:
          - {class_id: 1001, class_name: 'Yoga', category_id: 1, instructor_id: 11, scheduled_start: '2024-01-02 10:00:00', scheduled_end: '2024-01-02 11:00:00', capacity: 20, club_location: 'Bow'}
          - {class_id: 1002, class_name: 'Pilates', category_id: 2, instructor_id: 12, scheduled_start: '2024-01-02 10:00:00', scheduled_end: '2024-01-02 11:00:00', capacity: 20, club_location: 'Hackney'}
          - {class_id: 1003, class_name: 'Spin', category_id: 3, instructor_id: 13, scheduled_start: '2024-01-03 10:00:00', scheduled_end: '2024-01-03 11:00:00', capacity: 20, club_location: 'Stratford'}
          - {class_id: 1004, class_name: 'HIIT', category_id: 4, instructor_id: 14, scheduled_start: '2024-01-04 10:00:00', scheduled_end: '2024-01-04 11:00:00', capacity: 20, club_location: 'Canary Wharf'}
          - {class_id: 1005, class_name: 'Boxing', category_id: 5, instructor_id: 15, scheduled_start: '2024-01-05 10:00:00', scheduled_end: '2024-01-05 11:00:00', capacity: 20, club_location: 'Bow'}

    expect:
      rows:
        - {booking_id: 1, attended_flag: true, no_show_flag: false, cancelled_flag: false, attended_but_no_check_in_flag: false, cancelled_after_class_start_flag: false, late_check_in_flag: false}
        - {booking_id: 2, attended_flag: true, no_show_flag: false, cancelled_flag: false, attended_but_no_check_in_flag: true, cancelled_after_class_start_flag: false, late_check_in_flag: false}
        - {booking_id: 3, attended_flag: false, no_show_flag: false, cancelled_flag: true, attended_but_no_check_in_flag: false, cancelled_after_class_start_flag: true, late_check_in_flag: false}
        - {booking_id: 4, attended_flag: false, no_show_flag: true, cancelled_flag: false, attended_but_no_check_in_flag: false, cancelled_after_class_start_flag: false, late_check_in_flag: false}
        - {booking_id: 5, attended_flag: true, no_show_flag: false, cancelled_flag: false, attended_but_no_check_in_flag: false, cancelled_after_class_start_flag: false, late_check_in_flag: true}