name: dbt CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ./.github/dbt

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-bigquery

      - name: Install dbt packages
        run: dbt deps

      - name: Create profiles directory
        run: mkdir -p .github/dbt

      - name: Write service account key
        run: |
          echo '${{ secrets.DBT_BIGQUERY_KEYFILE_JSON }}' > /tmp/dbt-key.json

      - name: Write profiles.yml
        run: |
          cat > .github/dbt/profiles.yml <<EOF
          fittrack_analytics:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account
                project: ${{ secrets.DBT_GCP_PROJECT }}
                dataset: ${{ secrets.DBT_BQ_DATASET }}
                threads: 4
                keyfile: /tmp/dbt-key.json
                location: EU
                priority: interactive
          EOF

      - name: Parse project
        run: dbt parse --target ci

      - name: Build project
        run: dbt build --target ci